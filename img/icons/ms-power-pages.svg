<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="pp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00C4B4"/>
      <stop offset="100%" stop-color="#0095A9"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#pp-bg)"/>
  <!-- globe outline -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="white" stroke-width="1.6" opacity="0.95"/>
  <!-- equator -->
  <line x1="7" y1="16" x2="25" y2="16" stroke="white" stroke-width="1.4" opacity="0.85"/>
  <!-- meridian curve left -->
  <path d="M16 7 C11 10 11 22 16 25" fill="none" stroke="white" stroke-width="1.4" opacity="0.85"/>
  <!-- meridian curve right -->
  <path d="M16 7 C21 10 21 22 16 25" fill="none" stroke="white" stroke-width="1.4" opacity="0.85"/>
  <!-- latitude line top -->
  <path d="M9.5 12 Q16 10 22.5 12" fill="none" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <!-- latitude line bottom -->
  <path d="M9.5 20 Q16 22 22.5 20" fill="none" stroke="white" stroke-width="1.2" opacity="0.7"/>
</svg>
